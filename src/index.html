<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acoustic Propagator</title>

  <!-- CesiumJS -->
  <script src="../node_modules/cesium/Build/Cesium/Cesium.js"></script>
  <link rel="stylesheet" href="../node_modules/cesium/Build/Cesium/Widgets/widgets.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e17;
      --panel: rgba(10, 14, 23, 0.92);
      --dim: #233554;
      --text: #8892b0;
      --bright: #ccd6f6;
      --accent: #64ffda;
      --source: #ff3d71;
      --wave-direct: #00e5ff;
      --wave-r1: #ff9a1f;
      --wave-r2: #cc33ff;
      --font: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'SF Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #cesiumContainer {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }

    /* Override Cesium's default UI styling */
    .cesium-viewer-toolbar,
    .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer,
    .cesium-viewer-bottom,
    .cesium-viewer-fullscreenContainer {
      display: none !important;
    }

    .cesium-widget-credits { opacity: 0.3 !important; font-size: 9px !important; }

    /* ─── HUD Overlay ─── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
    }

    #hud > * { pointer-events: auto; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--dim);
      border-radius: 6px;
      padding: 12px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 11px;
      line-height: 1.8;
    }

    .panel-title {
      color: var(--bright);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--dim);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }

    /* ─── Header bar ─── */
    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: linear-gradient(180deg, rgba(15,21,36,0.95) 0%, rgba(10,14,23,0.8) 100%);
      border-bottom: 1px solid var(--dim);
      z-index: 20;
      -webkit-app-region: drag;
    }

    #header button, #header input, #header label { -webkit-app-region: no-drag; }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .status-dot.active {
      background: var(--source);
      box-shadow: 0 0 8px var(--source);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .app-title {
      color: var(--bright);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .app-subtitle {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* ─── Controls Panel ─── */
    #controls-panel {
      position: absolute;
      top: 52px;
      left: 12px;
      width: 280px;
    }

    #stats-panel {
      position: absolute;
      top: 52px;
      right: 12px;
      width: 260px;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
    }

    /* ─── Timeline ─── */
    #timeline {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px 14px;
      background: linear-gradient(0deg, rgba(15,21,36,0.95) 0%, rgba(10,14,23,0.85) 100%);
      border-top: 1px solid var(--dim);
    }

    #time-bar {
      position: relative;
      height: 36px;
      background: #0d1220;
      border-radius: 4px;
      border: 1px solid var(--dim);
      cursor: crosshair;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .time-marker {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      opacity: 0.7;
    }

    .time-label {
      position: absolute;
      top: 2px;
      font-size: 8px;
      transform: translateX(4px);
      white-space: nowrap;
    }

    #playhead {
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      background: var(--source);
      box-shadow: 0 0 8px var(--source);
      transition: left 0.05s linear;
    }

    .timeline-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ─── Buttons ─── */
    .btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      font-family: var(--font);
      letter-spacing: 2px;
      transition: all 0.15s;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn.active {
      background: var(--source);
      color: #fff;
      border-color: var(--source);
    }

    .btn-group {
      display: flex;
      gap: 4px;
    }

    .btn-sm {
      padding: 3px 8px;
      font-size: 9px;
      letter-spacing: 1px;
    }

    .btn-sm.selected {
      background: var(--accent);
      color: var(--bg);
    }

    /* ─── Inputs ─── */
    .coord-input {
      width: 70px;
      background: #0d1220;
      color: var(--bright);
      border: 1px solid var(--dim);
      border-radius: 2px;
      padding: 3px 6px;
      font-size: 10px;
      font-family: var(--font);
    }

    .coord-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .range-input {
      width: 90px;
      accent-color: var(--accent);
    }

    .range-value {
      color: var(--bright);
      width: 40px;
      display: inline-block;
      text-align: right;
    }

    /* ─── Section dividers ─── */
    .section {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--dim);
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--bright);
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tag {
      min-width: 28px;
      text-align: right;
    }

    .reflection-entry {
      font-size: 10px;
      line-height: 1.6;
      padding: 2px 0;
    }

    .dim { color: var(--dim); }
    .accent { color: var(--accent); }
    .source-color { color: var(--source); }

    /* Checkbox styling */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 10px;
    }

    .toggle-row input[type="checkbox"] {
      accent-color: var(--accent);
    }

    /* ─── Crosshair ─── */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #crosshair.visible {
      opacity: 0.5;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: var(--accent);
    }

    #crosshair::before {
      width: 1px; height: 100%;
      left: 50%;
    }

    #crosshair::after {
      width: 100%; height: 1px;
      top: 50%;
    }

    /* ─── Watermark ─── */
    #watermark {
      position: absolute;
      bottom: 110px;
      right: 16px;
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div id="cesiumContainer"></div>

  <div id="hud">
    <!-- Header -->
    <div id="header">
      <div class="header-left">
        <div class="status-dot" id="statusDot"></div>
        <span class="app-title">ACOUSTIC PROPAGATOR</span>
        <span class="app-subtitle">v = <span id="sosDisplay">348.69</span> m/s · Google 3D Tiles</span>
      </div>
      <div class="btn-group">
        <button class="btn btn-sm selected" id="btnOverview" onclick="setView('overview')">OVERVIEW</button>
        <button class="btn btn-sm" id="btnFPV" onclick="setView('fpv')">FPV</button>
        <button class="btn btn-sm" id="btnTop" onclick="setView('top')">TOP</button>
        <button class="btn btn-sm" id="btnOrbit" onclick="setView('orbit')">ORBIT</button>
      </div>
    </div>

    <!-- Controls -->
    <div id="controls-panel" class="panel">
      <div class="panel-title">POSITIONS (WGS84)</div>

      <div class="row">
        <div class="dot" style="background: var(--source)"></div>
        <span class="tag source-color">SRC</span>
        <span>Lat</span>
        <input class="coord-input" type="number" step="0.00001" id="srcLat" value="40.27750">
        <span>Lon</span>
        <input class="coord-input" type="number" step="0.00001" id="srcLon" value="-111.71380">
      </div>

      <div class="row">
        <div class="dot" style="background: var(--accent)"></div>
        <span class="tag accent">MIC</span>
        <span>Lat</span>
        <input class="coord-input" type="number" step="0.00001" id="micLat" value="40.27760">
        <span>Lon</span>
        <input class="coord-input" type="number" step="0.00001" id="micLon" value="-111.71360">
      </div>

      <div class="row" style="margin-top: 4px;">
        <span class="dim" style="font-size: 9px;">Heights above ground (m):</span>
        <span>SRC</span>
        <input class="coord-input" type="number" step="0.1" id="srcHeight" value="2.0" style="width:50px">
        <span>MIC</span>
        <input class="coord-input" type="number" step="0.1" id="micHeight" value="1.5" style="width:50px">
      </div>

      <div class="section">
        <div class="section-label">ENVIRONMENT</div>
        <div class="row">
          <span>Temp °F</span>
          <input class="coord-input" type="number" step="1" id="tempF" value="83" style="width:50px">
          <span>RH %</span>
          <input class="coord-input" type="number" step="1" id="rh" value="30" style="width:50px">
          <span>→ v =</span>
          <span id="computedSos" class="accent">348.69</span>
        </div>
      </div>

      <div class="section">
        <div class="section-label">LAYERS</div>
        <label class="toggle-row"><input type="checkbox" id="chkWaves" checked> Wavefronts</label>
        <label class="toggle-row"><input type="checkbox" id="chkReflections" checked> Reflections</label>
        <label class="toggle-row"><input type="checkbox" id="chkPaths" checked> Ray paths</label>
        <label class="toggle-row"><input type="checkbox" id="chkAudio"> Spatial audio playback</label>
      </div>

      <div class="section">
        <div class="section-label">SPATIAL AUDIO</div>
        <button class="btn" id="btnLoadWav" style="width: 100%; margin-top: 4px;">
          + LOAD DECODED WAV
        </button>
        <div id="wavInfo" style="margin-top: 6px; font-size: 10px; color: var(--dim);"></div>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats-panel" class="panel">
      <div class="panel-title">PROPAGATION</div>
      <div id="directStats">—</div>
      <div class="section" id="reflectionStats">
        <div class="section-label">REFLECTIONS</div>
        <div id="reflectionList">—</div>
      </div>
    </div>

    <!-- Crosshair for FPV -->
    <div id="crosshair"></div>

    <!-- Watermark -->
    <div id="watermark">NO BIAS · RAW PROPAGATION</div>

    <!-- Timeline -->
    <div id="timeline">
      <div id="time-bar" onclick="seekTimeline(event)">
        <div id="arrivalMarkers"></div>
        <div id="playhead" style="left: 0%"></div>
      </div>
      <div class="timeline-controls">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="btn" id="btnPropagate" onclick="togglePropagation()">▶ PROPAGATE</button>
          <button class="btn" onclick="resetSim()" style="border-color: var(--dim); color: var(--text);">↺ RESET</button>
          <span style="font-size: 12px; color: var(--bright); font-variant-numeric: tabular-nums;">
            <span id="simTimeDisplay">0.00</span> <span class="dim">ms</span>
          </span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <label style="font-size: 9px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;">
            SPEED
            <input class="range-input" type="range" min="0.005" max="0.5" step="0.005" value="0.08" id="speedSlider" oninput="updateSpeed()">
            <span class="range-value" id="speedValue">0.08×</span>
          </label>
          <label style="font-size: 9px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;">
            WINDOW
            <input class="range-input" type="range" min="20" max="500" step="10" value="150" id="windowSlider" oninput="updateWindow()">
            <span class="range-value" id="windowValue">150ms</span>
          </label>
        </div>
        <div style="font-size: 9px; color: var(--dim); letter-spacing: 1px;">
          NO BIAS · RAW PROPAGATION MODEL
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
